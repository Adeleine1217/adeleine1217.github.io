<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Fragment+Mono:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="site-brand" href="{{ '/' | relative_url }}" aria-label="Adeleine Wang home">
          <span class="brand-mark">
            <span class="brand-initials">AW</span>
            <span class="brand-caption">Strategy x Search x Growth</span>
          </span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/cv/' | relative_url }}" {% if page.url == '/cv/' %}aria-current="page"{% endif %}>My Resume</a>
          <a href="{{ '/blog/' | relative_url }}" {% if page.url == '/blog/' %}aria-current="page"{% endif %}>My Blog</a>
          <a href="mailto:hsiaotungw@gmail.com">Contact Me</a>
          <a href="{{ '/portfolio/' | relative_url }}" {% if page.url == '/portfolio/' %}aria-current="page"{% endif %}>My Creations</a>
        </nav>
        <div class="header-actions">
          <a class="button button-dark" href="https://www.linkedin.com/in/hsiao-tung-wang/" target="_blank" rel="noopener noreferrer">Hire me!</a>
        </div>
      </header>

      <main class="site-main">
        {{ content }}
      </main>
    </div>

    <div class="site-footer-wrap">
      <footer class="site-footer">
        <div class="footer-logo-card page-panel">
          <a class="site-brand" href="{{ '/' | relative_url }}" aria-label="Adeleine Wang home">
            <span class="brand-mark">
              <span class="brand-initials">AW</span>
              <span class="brand-caption">Portfolio x Resume x Writing</span>
            </span>
          </a>
        </div>
        <div class="footer-block">
          <div class="footer-heading">Contact Me:</div>
          <a class="footer-link" href="mailto:hsiaotungw@gmail.com">hsiaotungw@gmail.com</a>
          <a class="footer-link" href="https://www.linkedin.com/in/hsiao-tung-wang/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </div>
        <div class="footer-block">
          <div class="footer-heading">View Pages</div>
          <a class="footer-link" href="{{ '/' | relative_url }}">My Home Page</a>
          <a class="footer-link" href="{{ '/cv/' | relative_url }}">My Resume</a>
          <a class="footer-link" href="{{ '/blog/' | relative_url }}">My Blog</a>
          <a class="footer-link" href="{{ '/portfolio/' | relative_url }}">My Creations</a>
        </div>
      </footer>
    </div>
  </body>
</html>

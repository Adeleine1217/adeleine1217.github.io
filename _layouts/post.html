---
layout: default
---
<article class="article-page article-frame">
  <div class="article-topline">
    <div class="eyebrow">Blog Post</div>
    <a class="article-back-link" href="{{ '/blog/' | relative_url }}">Back to blog</a>
  </div>
  <header class="article-header">
    <h1>{{ page.title }}</h1>
    <div class="meta-row article-meta">
      {% if page.date %}
        <span class="meta-pill">{{ page.date | date: "%B %-d, %Y" }}</span>
      {% endif %}
      {% if page.tags and page.tags.size > 0 %}
        <span class="meta-pill">{{ page.tags | join: ", " }}</span>
      {% endif %}
    </div>
    {% if page.excerpt %}
      <p class="lede article-lede">{{ page.excerpt }}</p>
    {% endif %}
  </header>
  <div class="article-content">
    {{ content }}
  </div>
</article>
